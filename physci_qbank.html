<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhySci X — Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --surface: #0f1318;
    --surface2: #161b23;
    --border: #1e2530;
    --border2: #252d3a;
    --text: #e8ecf0;
    --muted: #6b7585;
    --dim: #3a4455;
    --accent: #4af0b0;
    --accent2: #0ef;
    --accent3: #f0a04a;
    --mark2: #4a9eff;
    --mark4: #a970ff;
    --mark6: #ff6b6b;
    --mark2bg: rgba(74,158,255,0.08);
    --mark4bg: rgba(169,112,255,0.08);
    --mark6bg: rgba(255,107,107,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── GLOW BG ── */
  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,240,176,0.04) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow2 {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,238,255,0.03) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 48px 40px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(9,12,16,0.98) 0%, rgba(9,12,16,0.85) 100%);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-tag::before {
    content: '';
    width: 28px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #fff;
  }

  h1 span {
    background: linear-gradient(120deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-num.c2 { color: var(--mark2); }
  .stat-num.c4 { color: var(--mark4); }
  .stat-num.c6 { color: var(--mark6); }

  /* ── LAYOUT ── */
  .layout {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 280px 1fr;
    max-width: 1100px;
    margin: 0 auto;
    min-height: calc(100vh - 200px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 20px 12px;
  }

  .chapter-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 20px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s ease;
    position: relative;
    border-left: 2px solid transparent;
  }

  .chapter-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .chapter-btn.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(74,240,176,0.05);
    font-weight: 500;
  }

  .chapter-btn .ch-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-right: 8px;
  }

  .chapter-btn.active .ch-num { color: var(--accent); opacity: 0.7; }

  .chapter-btn .ch-count {
    float: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 1px;
  }

  .chapter-btn.active .ch-count {
    background: rgba(74,240,176,0.1);
    color: var(--accent);
  }

  /* ── MAIN ── */
  .main {
    padding: 32px 40px;
    min-width: 0;
  }

  .chapter-view { display: none; }
  .chapter-view.active { display: block; }

  .chapter-header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .chapter-num-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .chapter-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .chapter-meta {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .meta-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .meta-pill.m2 { background: var(--mark2bg); color: var(--mark2); border: 1px solid rgba(74,158,255,0.15); }
  .meta-pill.m4 { background: var(--mark4bg); color: var(--mark4); border: 1px solid rgba(169,112,255,0.15); }
  .meta-pill.m6 { background: var(--mark6bg); color: var(--mark6); border: 1px solid rgba(255,107,107,0.15); }

  /* ── MARK SECTION ── */
  .mark-section { margin-bottom: 36px; }

  .mark-section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .mark-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .mark-label.m2 { color: var(--mark2); }
  .mark-label.m4 { color: var(--mark4); }
  .mark-label.m6 { color: var(--mark6); }

  .mark-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .mark-line.m2 { background: linear-gradient(90deg, rgba(74,158,255,0.3), transparent); }
  .mark-line.m4 { background: linear-gradient(90deg, rgba(169,112,255,0.3), transparent); }
  .mark-line.m6 { background: linear-gradient(90deg, rgba(255,107,107,0.3), transparent); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .q-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }

  .q-card.m2:hover { border-color: rgba(74,158,255,0.2); }
  .q-card.m4:hover { border-color: rgba(169,112,255,0.2); }
  .q-card.m6:hover { border-color: rgba(255,107,107,0.2); }

  .q-card .q-accent {
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .q-card.m2 .q-accent { background: var(--mark2); }
  .q-card.m4 .q-accent { background: var(--mark4); }
  .q-card.m6 .q-accent { background: var(--mark6); }

  .q-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.65;
    padding-left: 4px;
  }

  .q-badges {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .badge-diagram {
    background: rgba(240,160,74,0.1);
    color: var(--accent3);
    border: 1px solid rgba(240,160,74,0.2);
  }

  .badge-src {
    background: var(--surface2);
    color: var(--dim);
    border: 1px solid var(--border);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .filter-btn.active-all { color: #fff; border-color: var(--dim); background: var(--surface2); }
  .filter-btn.active-2 { color: var(--mark2); border-color: rgba(74,158,255,0.4); background: var(--mark2bg); }
  .filter-btn.active-4 { color: var(--mark4); border-color: rgba(169,112,255,0.4); background: var(--mark4bg); }
  .filter-btn.active-6 { color: var(--mark6); border-color: rgba(255,107,107,0.4); background: var(--mark6bg); }

  /* scrollbar for main */
  .main::-webkit-scrollbar { width: 4px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; display: flex; padding: 12px 0; }
    .sidebar-label { display: none; }
    .chapter-btn { display: inline-block; width: auto; border-left: none; border-bottom: 2px solid transparent; }
    .chapter-btn.active { border-bottom-color: var(--accent); border-left: none; }
    header { padding: 28px 20px 24px; }
    .main { padding: 24px 20px; }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-view.active {
    animation: fadeSlideIn 0.25s ease forwards;
  }

  .q-card {
    animation: fadeSlideIn 0.2s ease both;
  }

  .q-card:nth-child(1) { animation-delay: 0.03s; }
  .q-card:nth-child(2) { animation-delay: 0.06s; }
  .q-card:nth-child(3) { animation-delay: 0.09s; }
  .q-card:nth-child(4) { animation-delay: 0.12s; }
  .q-card:nth-child(5) { animation-delay: 0.15s; }

  .empty-state {
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 20px 0;
    text-align: center;
  }
</style>
</head>

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let activeChapter = 1;
let activeFilter = 'all';

function countQuestions(ch) {
  return ch.q2.length + ch.q4.length + ch.q6.length;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">Chapters</div>';
  chapters.forEach(ch => {
    const total = countQuestions(ch);
    html += `
      <button class="chapter-btn ${ch.id === activeChapter ? 'active' : ''}" 
              onclick="switchChapter(${ch.id})">
        <span class="ch-num">CH${String(ch.id).padStart(2,'0')}</span>${ch.short}
        <span class="ch-count">${total}</span>
      </button>
    `;
  });
  sidebar.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main');
  let html = '';

  chapters.forEach(ch => {
    const isActive = ch.id === activeChapter;
    const filtered2 = activeFilter === 'all' || activeFilter === '2' ? ch.q2 : [];
    const filtered4 = activeFilter === 'all' || activeFilter === '4' ? ch.q4 : [];
    const filtered6 = activeFilter === 'all' || activeFilter === '6' ? ch.q6 : [];

    html += `<div class="chapter-view ${isActive ? 'active' : ''}" id="ch-${ch.id}">`;

    // Chapter header
    html += `
      <div class="chapter-header">
        <div class="chapter-num-badge">Chapter ${ch.id} of 12</div>
        <div class="chapter-title">${ch.title}</div>
        <div class="chapter-meta">
          <span class="meta-pill m2">◈ ${ch.q2.length} × 2M</span>
          <span class="meta-pill m4">◈ ${ch.q4.length} × 4M</span>
          <span class="meta-pill m6">◈ ${ch.q6.length} × 6M</span>
        </div>
      </div>
    `;

    // Filter bar
    html += `
      <div class="filter-bar">
        <span class="filter-label">Filter</span>
        <button class="filter-btn ${activeFilter==='all'?'active-all':''}" onclick="setFilter('all',${ch.id})">All</button>
        <button class="filter-btn ${activeFilter==='2'?'active-2':''}" onclick="setFilter('2',${ch.id})">2 Marks</button>
        <button class="filter-btn ${activeFilter==='4'?'active-4':''}" onclick="setFilter('4',${ch.id})">4 Marks</button>
        <button class="filter-btn ${activeFilter==='6'?'active-6':''}" onclick="setFilter('6',${ch.id})">6 Marks</button>
      </div>
    `;

    // 2 Markers
    if (filtered2.length > 0) {
      html += `<div class="mark-section">`;
      html += `<div class="mark-section-header"><span class="mark-label m2">2 Marks</span><div class="mark-line m2"></div></div>`;
      filtered2.forEach((q, i) => {
        html += `
          <div class="q-card m2">
            <div class="q-accent"></div>
            <div class="q-text">${i+1}. ${q.text}</div>
            <div class="q-badges">
              ${q.diagram ? '<span class="badge badge-diagram">📐 Diagram</span>' : ''}
              <span class="badge badge-src">${q.src}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // 4 Markers
    if (filtered4.length > 0) {
      html += `<div class="mark-section">`;
      html += `<div class="mark-section-header"><span class="mark-label m4">4 Marks</span><div class="mark-line m4"></div></div>`;
      filtered4.forEach((q, i) => {
        html += `
          <div class="q-card m4">
            <div class="q-accent"></div>
            <div class="q-text">${i+1}. ${q.text}</div>
            <div class="q-badges">
              ${q.diagram ? '<span class="badge badge-diagram">📐 Diagram</span>' : ''}
              <span class="badge badge-src">${q.src}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // 6 Markers
    if (filtered6.length > 0) {
      html += `<div class="mark-section">`;
      html += `<div class="mark-section-header"><span class="mark-label m6">6 Marks</span><div class="mark-line m6"></div></div>`;
      filtered6.forEach((q, i) => {
        html += `
          <div class="q-card m6">
            <div class="q-accent"></div>
            <div class="q-text">${i+1}. ${q.text}</div>
            <div class="q-badges">
              ${q.diagram ? '<span class="badge badge-diagram">📐 Diagram</span>' : ''}
              <span class="badge badge-src">${q.src}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    if (filtered2.length + filtered4.length + filtered6.length === 0) {
      html += `<div class="empty-state">// no questions for this filter</div>`;
    }

    html += `</div>`;
  });

  main.innerHTML = html;
}

function renderStats() {
  let total2=0, total4=0, total6=0;
  chapters.forEach(ch => { total2+=ch.q2.length; total4+=ch.q4.length; total6+=ch.q6.length; });
  document.getElementById('total-q').textContent = total2+total4+total6;
  document.getElementById('total-2').textContent = total2;
  document.getElementById('total-4').textContent = total4;
  document.getElementById('total-6').textContent = total6;
}

function switchChapter(id) {
  activeChapter = id;
  activeFilter = 'all';
  renderSidebar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
}

function setFilter(f, chId) {
  activeFilter = f;
  renderMain();
}

// Init
renderSidebar();
renderMain();
renderStats();
</script>
